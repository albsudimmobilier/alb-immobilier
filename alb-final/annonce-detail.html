<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Détail Annonce - ALB Immobilier</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --pourpre: #4B1A3E;
      --dore: #B28E3D;
      --creme: #f5f3ee;
      --light-bg: #f9f7f4;
    }
    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--creme);
      color: #2b2b2b;
    }
    .header {
      background: white;
      border-bottom: 3px solid var(--dore);
      padding: 15px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-family: 'Playfair Display';
      font-size: 1.3rem;
      color: var(--pourpre);
      cursor: pointer;
    }
    .logo strong { color: var(--dore); }
    .btn-back {
      background: var(--light-bg);
      color: var(--pourpre);
      padding: 8px 16px;
      border: 1px solid var(--dore);
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s;
    }
    .btn-back:hover {
      background: #f0ebe3;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .annonce-hero {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(75, 26, 62, 0.1);
      margin-bottom: 30px;
    }
    .annonce-image {
      width: 100%;
      height: 400px;
      background: linear-gradient(135deg, #f5f3ee 0%, #fafaf8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 5rem;
    }
    .annonce-header {
      padding: 30px;
    }
    .annonce-titre {
      font-family: 'Playfair Display';
      font-size: 2rem;
      color: var(--pourpre);
      margin-bottom: 10px;
    }
    .annonce-localisation {
      color: #666;
      font-size: 1rem;
      margin-bottom: 20px;
    }
    .annonce-prix {
      font-size: 2.2rem;
      color: var(--dore);
      font-weight: bold;
      font-family: 'Playfair Display';
      margin-bottom: 20px;
    }
    .btn-visite {
      background: linear-gradient(135deg, var(--pourpre), #6b2d5f);
      color: white;
      padding: 16px 40px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 1.1rem;
      transition: all 0.3s;
      width: 100%;
      max-width: 400px;
    }
    .btn-visite:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(75, 26, 62, 0.3);
    }
    .content-wrapper {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 30px;
    }
    .annonce-details {
      background: white;
      border-radius: 8px;
      padding: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .details-title {
      font-family: 'Playfair Display';
      color: var(--pourpre);
      font-size: 1.4rem;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--dore);
    }
    .caracteristiques-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }
    .caracteristique {
      padding: 15px;
      background: #f9f7f4;
      border-radius: 6px;
      border-left: 3px solid var(--dore);
    }
    .caracteristique-label {
      color: #999;
      font-size: 0.85rem;
      margin-bottom: 5px;
      font-weight: 600;
    }
    .caracteristique-valeur {
      color: var(--pourpre);
      font-size: 1.1rem;
      font-weight: 600;
    }
    .description {
      padding: 20px;
      background: #f9f7f4;
      border-radius: 6px;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    .videos-section {
      margin-top: 30px;
    }
    .video-placeholder {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, #e0dcc8 0%, #f0ebe3 100%);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 2rem;
      margin-bottom: 15px;
    }
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .vendeur-card {
      background: white;
      border-radius: 8px;
      padding: 25px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border-top: 3px solid var(--dore);
    }
    .vendeur-title {
      color: var(--pourpre);
      font-weight: 600;
      margin-bottom: 15px;
      font-size: 1rem;
    }
    .vendeur-info {
      margin-bottom: 15px;
    }
    .vendeur-label {
      color: #999;
      font-size: 0.85rem;
      margin-bottom: 3px;
    }
    .vendeur-value {
      color: var(--pourpre);
      font-weight: 600;
    }
    .vendeur-badge {
      display: inline-block;
      padding: 4px 12px;
      background: #d4edda;
      color: #155724;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .horaires-card {
      background: white;
      border-radius: 8px;
      padding: 25px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border-top: 3px solid #4caf50;
    }
    .horaires-title {
      color: var(--pourpre);
      font-weight: 600;
      margin-bottom: 15px;
    }
    .horaire {
      padding: 10px 0;
      border-bottom: 1px solid #eee;
      font-size: 0.95rem;
    }
    .horaire:last-child {
      border-bottom: none;
    }
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      overflow-y: auto;
    }
    .modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: white;
      margin: 20px auto;
      max-width: 900px;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      position: relative;
    }
    .modal-close {
      position: absolute;
      right: 20px;
      top: 20px;
      background: none;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: #666;
    }
    .modal-close:hover {
      color: var(--pourpre);
    }
    #simulateur-iframe {
      width: 100%;
      height: 1200px;
      border: none;
      border-radius: 8px;
    }
    @media (max-width: 1024px) {
      .content-wrapper {
        grid-template-columns: 1fr;
      }
      .caracteristiques-grid {
        grid-template-columns: 1fr;
      }
      .annonce-titre {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-content">
    <div class="logo" onclick="window.location.href='index.html'"><strong>ALB</strong> Immobilier</div>
    <div class="header-actions">
      <a href="annonces.html" class="btn-back">← Retour aux annonces</a>
    </div>
  </div>
</header>

<div class="container">
  <!-- ANNONCE HERO -->
  <div class="annonce-hero">
    <div class="annonce-image">🏠</div>
    <div class="annonce-header">
      <h1 class="annonce-titre" id="annonce-titre">Chargement...</h1>
      <p class="annonce-localisation" id="annonce-localisation">📍 Chargement...</p>
      <div class="annonce-prix" id="annonce-prix">-</div>
      <button class="btn-visite" onclick="ouvrirSimulateur()">💰 Demander une visite</button>
    </div>
  </div>

  <!-- CONTENU PRINCIPAL -->
  <div class="content-wrapper">
    <!-- GAUCHE: DÉTAILS -->
    <div class="annonce-details">
      <!-- CARACTÉRISTIQUES -->
      <h2 class="details-title">📋 Caractéristiques</h2>
      <div class="caracteristiques-grid" id="carac-grid">
        <div style="text-align: center; color: #999;">Chargement...</div>
      </div>

      <!-- DESCRIPTION -->
      <h2 class="details-title" style="margin-top: 30px;">📝 Description</h2>
      <div class="description" id="annonce-description">
        <p>Chargement...</p>
      </div>

      <!-- VIDÉOS -->
      <div class="videos-section">
        <h2 class="details-title">📹 Visite virtuelle</h2>
        <div class="video-placeholder">🎬</div>
        <p style="color: #999; text-align: center; font-size: 0.9rem;">Vidéo de présentation du bien</p>
      </div>
    </div>

    <!-- DROITE: SIDEBAR -->
    <div class="sidebar">
      <!-- VENDEUR -->
      <div class="vendeur-card" id="vendeur-card">
        <div class="vendeur-title">👤 Vendu par</div>
        <div style="color: #999;">Chargement...</div>
      </div>

      <!-- HORAIRES DISPONIBILITÉS -->
      <div class="horaires-card" id="horaires-card">
        <div class="horaires-title">⏰ Disponibilités pour visite</div>
        <div style="color: #999;">Chargement...</div>
      </div>

      <!-- CTA SECONDAIRE -->
      <button class="btn-visite" onclick="ouvrirSimulateur()">💰 Demander une visite</button>
    </div>
  </div>
</div>

<!-- MODAL SIMULATEUR -->
<div id="modal-simulateur" class="modal">
  <div class="modal-content">
    <button class="modal-close" onclick="fermerSimulateur()">&times;</button>
    <iframe id="simulateur-iframe" src="/simulateur-budget.html?bien_id=exemple&mode=modal"></iframe>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>

<script>
  let bienId = null;

  async function init() {
    // Get bien_id from URL
    const urlParams = new URLSearchParams(window.location.search);
    bienId = urlParams.get('bien_id');

    if (!bienId) {
      document.getElementById('annonce-titre').textContent = '❌ Bien non trouvé';
      return;
    }

    // Load bien
    await loadBien(bienId);
  }

  async function loadBien(id) {
    try {
      const { data, error } = await window.supabaseClient
        .from('biens_immobiliers')
        .select('*')
        .eq('id', id)
        .single();

      if (error) throw error;

      displayBien(data);
      await loadVendeur(data.vendeur_id);

    } catch (err) {
      console.error('Erreur:', err);
      document.getElementById('annonce-titre').textContent = '❌ Bien non trouvé';
    }
  }

  function displayBien(bien) {
    // Titre et prix
    document.getElementById('annonce-titre').textContent = bien.titre || 'Sans titre';
    document.getElementById('annonce-localisation').textContent = `📍 ${bien.code_postal} ${bien.ville}`;
    document.getElementById('annonce-prix').textContent = bien.prix_vente?.toLocaleString('fr-FR') + '€';
    
    // Description
    document.getElementById('annonce-description').innerHTML = `
      <p>${bien.description || 'Aucune description'}</p>
      <br>
      <p>À la bien, toujours ✨ ALB Immobilier</p>
    `;

    // Caractéristiques
    const dpeColor = bien.dpe === 'A' || bien.dpe === 'B' ? '#155724' : '#666';
    document.getElementById('carac-grid').innerHTML = `
      <div class="caracteristique">
        <div class="caracteristique-label">Type de bien</div>
        <div class="caracteristique-valeur">${bien.type_bien || 'Non spécifié'}</div>
      </div>
      <div class="caracteristique">
        <div class="caracteristique-label">Surface</div>
        <div class="caracteristique-valeur">${bien.surface || '-'} m²</div>
      </div>
      <div class="caracteristique">
        <div class="caracteristique-label">Pièces</div>
        <div class="caracteristique-valeur">${bien.nb_pieces || '-'}</div>
      </div>
      <div class="caracteristique">
        <div class="caracteristique-label">Terrain</div>
        <div class="caracteristique-valeur">${bien.surface_terrain || '-'} m²</div>
      </div>
      <div class="caracteristique">
        <div class="caracteristique-label">DPE</div>
        <div class="caracteristique-valeur" style="color: ${dpeColor};">${bien.dpe || '-'}</div>
      </div>
      <div class="caracteristique">
        <div class="caracteristique-label">GES</div>
        <div class="caracteristique-valeur">${bien.ges || '-'}</div>
      </div>
    `;
  }

  async function loadVendeur(vendeurId) {
    try {
      const { data, error } = await window.supabaseClient
        .from('profiles')
        .select('prenom, nom, disponibilites_rdv, statut_verifie')
        .eq('id', vendeurId)
        .single();

      if (error) throw error;

      // Afficher vendeur
      const badgeVerif = data.statut_verifie ? '✅ Profil vérifié' : '⏳ Vérification en cours';
      document.getElementById('vendeur-card').innerHTML = `
        <div class="vendeur-title">👤 Vendu par</div>
        <div class="vendeur-badge">${badgeVerif}</div>
        <div class="vendeur-info">
          <div class="vendeur-label">Nom</div>
          <div class="vendeur-value">${data.prenom || ''} ${data.nom || 'Particulier'}</div>
        </div>
        <div class="vendeur-info">
          <div class="vendeur-label">Type</div>
          <div class="vendeur-value">Particulier</div>
        </div>
      `;

      // Afficher horaires
      if (data.disponibilites_rdv && data.disponibilites_rdv.length > 0) {
        const dispos = data.disponibilites_rdv.map(d => {
          const date = new Date(d);
          return `📅 <strong>${date.toLocaleDateString('fr-FR')}</strong> • ${date.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })}`;
        }).join('</div><div class="horaire">');
        
        document.getElementById('horaires-card').innerHTML = `
          <div class="horaires-title">⏰ Disponibilités pour visite</div>
          <div class="horaire">${dispos}</div>
        `;
      }

    } catch (err) {
      console.error('Erreur vendeur:', err);
    }
  }

  function ouvrirSimulateur() {
    document.getElementById('modal-simulateur').classList.add('active');
    // Update iframe bien_id
    document.getElementById('simulateur-iframe').src = `/simulateur-budget.html?bien_id=${bienId}`;
  }

  function fermerSimulateur() {
    document.getElementById('modal-simulateur').classList.remove('active');
  }

  // Fermer au clic en dehors
  document.getElementById('modal-simulateur').addEventListener('click', (e) => {
    if (e.target.id === 'modal-simulateur') {
      fermerSimulateur();
    }
  });

  init();
</script>

</body>
</html>
