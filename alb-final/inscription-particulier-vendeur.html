<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S'inscrire - Vendeur - ALB Immobilier</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    :root {
      --pourpre: #4B1A3E;
      --dore: #B28E3D;
      --creme: #f5f3ee;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Montserrat', sans-serif;
      background-color: var(--creme);
      color: var(--pourpre);
      min-height: 100vh;
    }
    .container {
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
    }
    .form-wrapper {
      background-color: #ffffff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    h1 {
      font-family: 'Playfair Display', serif;
      color: var(--pourpre);
      margin-bottom: 10px;
      font-size: 28px;
    }
    .subtitle {
      color: #999;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: var(--pourpre);
    }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--dore);
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }
    input:focus {
      outline: none;
      border-color: var(--pourpre);
      box-shadow: 0 0 5px rgba(75, 26, 62, 0.3);
    }
    .checkbox-group {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }
    .checkbox-group input[type="checkbox"] {
      width: auto;
      margin-right: 10px;
    }
    .checkbox-group label {
      margin-bottom: 0;
      font-weight: normal;
    }
    .checkbox-group a {
      color: var(--dore);
      text-decoration: none;
    }
    .submit-btn {
      width: 100%;
      padding: 14px;
      background-color: var(--dore);
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
      transition: background-color 0.3s;
    }
    .submit-btn:hover {
      background-color: #a67c2c;
    }
    .error-message {
      color: #dc3545;
      background-color: #ffe6e6;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      text-align: center;
      display: none;
    }
    .success-message {
      color: #28a745;
      background-color: #e6ffe6;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      text-align: center;
      display: none;
    }
    .back-link {
      text-align: center;
      margin-top: 20px;
    }
    .back-link a {
      color: var(--dore);
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="form-wrapper">
      <h1>S'inscrire</h1>
      <p class="subtitle">Particulier Vendeur</p>

      <div id="errorMessage" class="error-message"></div>
      <div id="successMessage" class="success-message"></div>

      <form id="inscriptionForm">
        <div class="form-group">
          <label for="prenom">Prénom *</label>
          <input type="text" id="prenom" name="prenom" required />
        </div>

        <div class="form-group">
          <label for="nom">Nom *</label>
          <input type="text" id="nom" name="nom" required />
        </div>

        <div class="form-group">
          <label for="email">Email *</label>
          <input type="email" id="email" name="email" required />
        </div>

        <div class="form-group">
          <label for="telephone">Téléphone *</label>
          <input type="tel" id="telephone" name="telephone" required />
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="cgu" name="cgu" required />
          <label for="cgu">
            J'accepte les <a href="/conditions-generales">conditions générales</a> et la <a href="/confidentialite">politique de confidentialité</a>
          </label>
        </div>

        <button type="submit" class="submit-btn">Créer mon compte</button>
      </form>

      <div class="back-link">
        <a href="/">← Retour</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('inscriptionForm');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const prenom = document.getElementById('prenom').value.trim();
      const nom = document.getElementById('nom').value.trim();
      const email = document.getElementById('email').value.trim();
      const telephone = document.getElementById('telephone').value.trim();

      if (!prenom || !nom || !email || !telephone) {
        showError('Veuillez remplir tous les champs');
        return;
      }

      try {
        const response = await fetch('/.netlify/functions/create-account', {
          method: 'POST',
          body: JSON.stringify({
            prenom,
            nom,
            email,
            telephone,
            profil: 'particulier_vendeur'  // ← VALEUR CORRECTE
          })
        });

        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.error || 'Erreur lors de la création du compte');
        }

        showSuccess('Compte créé ! Vérifiez votre email pour votre PIN');
        form.reset();
        setTimeout(() => {
          window.location.href = '/';
        }, 2000);
      } catch (err) {
        showError(err.message);
      }
    });

    function showError(msg) {
      const el = document.getElementById('errorMessage');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 5000);
    }

    function showSuccess(msg) {
      const el = document.getElementById('successMessage');
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
