<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - ALB Immobilier</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: Montserrat, sans-serif; 
      background: linear-gradient(135deg, #f5f3ee 0%, #fbf8f3 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    
    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(75, 26, 62, 0.1);
      max-width: 500px;
      width: 100%;
      padding: 3rem 2rem;
      border-left: 6px solid #B28E3D;
    }
    
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo h1 { font-family: Playfair Display, serif; font-size: 28px; color: #4B1A3E; }
    .logo .tagline { color: #B28E3D; font-weight: 600; font-size: 12px; letter-spacing: 2px; margin-top: 0.5rem; }
    
    .tabs { display: flex; gap: 0; margin-bottom: 2rem; border-bottom: 2px solid #e5e4e1; }
    .tab-btn { 
      flex: 1; 
      padding: 1rem; 
      background: transparent; 
      border: none; 
      cursor: pointer; 
      font-size: 14px; 
      font-weight: 600; 
      color: #888780;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
    }
    .tab-btn.active { color: #4B1A3E; border-bottom-color: #B28E3D; }
    .tab-btn:hover { color: #4B1A3E; }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn 0.3s; }
    
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 0.5rem; color: #2c2c2a; }
    .form-group input, 
    .form-group select { 
      width: 100%; 
      padding: 12px 14px; 
      border: 1px solid #d3d1c7; 
      border-radius: 8px; 
      font-family: Montserrat, sans-serif;
      font-size: 14px;
      transition: all 0.2s;
    }
    .form-group input:focus, 
    .form-group select:focus { 
      outline: none; 
      border-color: #4B1A3E; 
      box-shadow: 0 0 0 3px rgba(75, 26, 62, 0.1);
    }
    
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    
    .checkbox-group { display: flex; gap: 0.5rem; align-items: flex-start; }
    .checkbox-group input { margin-top: 3px; cursor: pointer; width: auto; }
    .checkbox-group label { margin: 0; font-size: 12px; cursor: pointer; line-height: 1.4; }
    .checkbox-group a { color: #B28E3D; text-decoration: none; font-weight: 600; }
    .checkbox-group a:hover { text-decoration: underline; }
    
    .btn-login, .btn-signup { 
      width: 100%; 
      padding: 12px; 
      background: #4B1A3E; 
      color: white; 
      border: none; 
      border-radius: 8px; 
      font-weight: 600; 
      font-size: 14px; 
      cursor: pointer; 
      transition: all 0.2s;
      margin-top: 1rem;
    }
    .btn-login:hover, .btn-signup:hover { background: #35132b; opacity: 0.9; }
    .btn-login:disabled, .btn-signup:disabled { opacity: 0.6; cursor: not-allowed; }
    
    .link-group { text-align: center; margin-top: 1.5rem; font-size: 12px; }
    .link-group a { color: #B28E3D; text-decoration: none; font-weight: 600; }
    .link-group a:hover { text-decoration: underline; }
    
    .loading, .error, .success { 
      display: none; 
      padding: 1rem; 
      margin: 1rem 0; 
      border-radius: 8px; 
      text-align: center; 
      font-size: 14px;
    }
    .loading { background: #e3f2fd; color: #1565c0; }
    .error { background: #ffebee; color: #c62828; }
    .success { background: #e8f5e9; color: #2e7d32; }
    
    .back-link { text-align: center; margin-top: 2rem; }
    .back-link a { color: #B28E3D; text-decoration: none; font-size: 12px; font-weight: 600; }
    .back-link a:hover { text-decoration: underline; }
    
    @media (max-width: 600px) {
      .container { padding: 2rem 1.5rem; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="logo">
    <h1>ALB <span style="color: #2c2c2a;">Immobilier</span></h1>
    <div class="tagline">À la bien, toujours ✨</div>
  </div>

  <!-- ONGLETS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('connexion')">Connexion</button>
    <button class="tab-btn" onclick="switchTab('inscription')">S'inscrire</button>
  </div>

  <!-- ===== ONGLET CONNEXION ===== -->
  <div id="connexion" class="tab-content active">
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email-login">Email</label>
        <input 
          type="email" 
          id="email-login" 
          placeholder="vous@example.fr"
          required
        >
      </div>
      <div class="form-group">
        <label for="pin-login">Code PIN (4 chiffres)</label>
        <input 
          type="text" 
          id="pin-login" 
          placeholder="0000"
          maxlength="4"
          pattern="[0-9]{4}"
          required
        >
      </div>
      <button type="submit" class="btn-login" id="btn-login">Se connecter</button>
    </form>
    <div class="link-group">
      <a href="pin-oublie.html">PIN oublié ?</a>
    </div>
    <div class="loading" id="loading-login">Vérification en cours...</div>
    <div class="error" id="error-login"></div>
    <div class="success" id="success-login">Connexion réussie, redirection...</div>
  </div>

  <!-- ===== ONGLET S'INSCRIRE ===== -->
  <div id="inscription" class="tab-content">
    <form id="signup-form" onsubmit="handleSignup(event)">
      <div class="form-row">
        <div class="form-group">
          <label for="prenom-signup">Prénom *</label>
          <input 
            type="text" 
            id="prenom-signup" 
            placeholder="Jean"
            required
          >
        </div>
        <div class="form-group">
          <label for="nom-signup">Nom *</label>
          <input 
            type="text" 
            id="nom-signup" 
            placeholder="Dupont"
            required
          >
        </div>
      </div>
      
      <div class="form-group">
        <label for="email-signup">Email *</label>
        <input 
          type="email" 
          id="email-signup" 
          placeholder="vous@example.fr"
          required
        >
      </div>
      
      <div class="form-group">
        <label for="telephone-signup">Téléphone *</label>
        <input 
          type="tel" 
          id="telephone-signup" 
          placeholder="06 12 34 56 78"
          required
        >
      </div>
      
      <div class="form-group">
        <label for="profil-signup">Profil *</label>
        <select id="profil-signup" required>
          <option value="">-- Choisissez --</option>
          <option value="particulier">Particulier (Acheteur)</option>
          <option value="particulier_vendeur">Particulier (Vendeur)</option>
          <option value="courtier">Courtier</option>
          <option value="artisan">Artisan</option>
          <option value="agent_immobilier">Agent immobilier</option>
          <option value="mandataire_immobilier">Mandataire immobilier</option>
        </select>
      </div>
      
      <div class="checkbox-group">
        <input type="checkbox" id="cgu-checkbox" required>
        <label for="cgu-checkbox">
          J'accepte les <a href="cgu.html" target="_blank">conditions générales</a> et la <a href="confidentialite.html" target="_blank">politique de confidentialité</a>
        </label>
      </div>
      
      <button type="submit" class="btn-signup" id="btn-signup">Créer mon compte</button>
    </form>
    
    <div class="loading" id="loading-signup">Création du compte en cours...</div>
    <div class="error" id="error-signup"></div>
    <div class="success" id="success-signup">Compte créé! Redirection...</div>
  </div>

  <div class="back-link">
    <a href="index.html">← Retour à l'accueil</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>

<script>
  // Switch tabs
  function switchTab(tab) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
    event.target.classList.add('active');
  }

  // ===== CONNEXION =====
  async function handleLogin(event) {
    event.preventDefault();
    const email = document.getElementById('email-login').value;
    const pin = document.getElementById('pin-login').value;
    const errorEl = document.getElementById('error-login');
    const successEl = document.getElementById('success-login');
    const loadingEl = document.getElementById('loading-login');
    const btnSubmit = document.getElementById('btn-login');

    errorEl.style.display = 'none';
    successEl.style.display = 'none';
    loadingEl.style.display = 'block';
    btnSubmit.disabled = true;

    try {
      const { data, error } = await window.supabaseClient
        .from('profiles')
        .select('id, pin, statut_verifie')
        .eq('email', email)
        .eq('pin', pin)
        .single();

      if (error || !data) {
        throw new Error('Email ou code PIN incorrect');
      }

      if (data && !data.statut_verifie) {
        throw new Error('Votre compte est en attente de validation. Nous vous confirmerons par email.');
      }

      localStorage.setItem('alb_user', data.id);
      successEl.style.display = 'block';
      loadingEl.style.display = 'none';

      setTimeout(() => {
        window.location.href = 'espace-perso.html';
      }, 1000);
    } catch (error) {
      errorEl.textContent = error.message;
      errorEl.style.display = 'block';
      loadingEl.style.display = 'none';
      btnSubmit.disabled = false;
    }
  }

  // ===== INSCRIPTION =====
  async function handleSignup(event) {
    event.preventDefault();
    const prenom = document.getElementById('prenom-signup').value;
    const nom = document.getElementById('nom-signup').value;
    const email = document.getElementById('email-signup').value;
    const telephone = document.getElementById('telephone-signup').value;
    const profil = document.getElementById('profil-signup').value;
    const cguAccepted = document.getElementById('cgu-checkbox').checked;

    const errorEl = document.getElementById('error-signup');
    const successEl = document.getElementById('success-signup');
    const loadingEl = document.getElementById('loading-signup');
    const btnSubmit = document.getElementById('btn-signup');

    errorEl.style.display = 'none';
    successEl.style.display = 'none';

    if (!cguAccepted) {
      errorEl.textContent = 'Vous devez accepter les conditions générales';
      errorEl.style.display = 'block';
      return;
    }

    loadingEl.style.display = 'block';
    btnSubmit.disabled = true;

    try {
      // Générer un PIN aléatoire 4 chiffres
      const randomPin = Math.floor(Math.random() * 10000).toString().padStart(4, '0');

      // Mapper le profil au role Supabase
      const roleMapping = {
        'particulier': 'particulier',
        'particulier_vendeur': 'particulier',
        'courtier': 'courtier',
        'artisan': 'artisan',
        'agent_immobilier': 'agent_immobilier',
        'mandataire_immobilier': 'mandataire_immobilier'
      };

      const role = roleMapping[profil] || profil;

      // Insérer le nouvel utilisateur
      const { data, error } = await window.supabaseClient
        .from('profiles')
        .insert([{
          prenom: prenom,
          nom: nom,
          email: email,
          telephone: telephone,
          role: role,
          pin: randomPin,
          statut_verifie: (role === 'particulier'), // Les particuliers sont auto-vérifiés
          cgu_acceptees_le: new Date().toISOString()
        }])
        .select()
        .single();

      if (error) {
        throw new Error(error.message || 'Erreur lors de la création du compte');
      }

      // Envoyer l'email avec le PIN
      // À ce stade, le webhook Supabase devrait déclencher send-questionnaire-email.js
      // qui enverra le PIN et les instructions

      successEl.style.display = 'block';
      loadingEl.style.display = 'none';

      setTimeout(() => {
        // Redirection automatique vers espace-perso après 2 sec
        localStorage.setItem('alb_user', data.id);
        window.location.href = 'espace-perso.html';
      }, 2000);

    } catch (error) {
      errorEl.textContent = error.message;
      errorEl.style.display = 'block';
      loadingEl.style.display = 'none';
      btnSubmit.disabled = false;
    }
  }

  // Si déjà connecté, redirect
  if (localStorage.getItem('alb_user')) {
    window.location.href = 'espace-perso.html';
  }
</script>

</body>
</html>
