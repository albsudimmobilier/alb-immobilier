<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vitrine des Professionnels - ALB Immobilier</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: Montserrat, sans-serif; 
      background: #f5f3ee; 
      color: #2c2c2a;
      line-height: 1.6;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1rem; }
    h1 { font-family: Playfair Display, serif; font-size: 32px; font-weight: 700; margin-bottom: 0.5rem; color: #4B1A3E; }
    .subtitle { color: #888780; font-size: 15px; margin-bottom: 2rem; }
    
    .filters { background: white; padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; border: 0.5px solid #e5e4e1; }
    .filter-group { margin-bottom: 1.5rem; }
    .filter-group:last-child { margin-bottom: 0; }
    .filter-label { font-weight: 500; font-size: 14px; margin-bottom: 0.8rem; display: block; }
    input[type="text"] { width: 100%; padding: 10px 12px; border: 0.5px solid #d3d1c7; border-radius: 8px; font-size: 14px; font-family: Montserrat; }
    .filter-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
    .filter-btn { padding: 8px 14px; border: 0.5px solid #d3d1c7; background: white; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; }
    .filter-btn.active { background: #4B1A3E; color: white; border-color: #4B1A3E; }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 20px; }
    .card { background: white; border: 0.5px solid #e5e4e1; border-radius: 12px; padding: 1.5rem; display: flex; flex-direction: column; }
    .card-header { display: flex; gap: 12px; margin-bottom: 1rem; }
    .avatar { width: 50px; height: 50px; border-radius: 50%; background: #7F77DD; display: flex; align-items: center; justify-content: center; color: white; font-weight: 500; flex-shrink: 0; }
    .card-title { flex: 1; }
    .card-title h3 { font-size: 15px; font-weight: 500; margin-bottom: 0.25rem; }
    .card-title p { font-size: 13px; color: #888780; }
    
    .badges { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
    .badge { background: #EAF3DE; color: #3B6D11; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 500; }
    .badge.courtier { background: #E6F1FB; color: #185FA5; }
    .badge.artisan { background: #FAEEDA; color: #854F0B; }
    .badge.agent { background: #E6F1FB; color: #185FA5; }
    
    .description { font-size: 13px; color: #888780; line-height: 1.5; margin-bottom: 1rem; }
    
    .info-box { background: #FBF8F3; border-radius: 8px; padding: 10px 12px; margin-bottom: 1rem; font-size: 12px; }
    .info-line { margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
    .info-line:last-child { margin-bottom: 0; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .status-online { background: #10b981; }
    .status-busy { background: #f59e0b; }
    .status-offline { background: #ef4444; }
    
    .rating { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; font-size: 13px; }
    .stars { color: #f59e0b; }
    .review-link { background: transparent; border: none; color: #185FA5; cursor: pointer; font-weight: 500; font-size: 12px; padding: 0; margin-left: auto; }
    
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .btn { padding: 10px 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; font-size: 13px; transition: all 0.2s; }
    .btn-primary { background: #4B1A3E; color: white; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary { background: transparent; border: 0.5px solid #d3d1c7; color: #2c2c2a; }
    .btn-secondary:hover { background: #FBF8F3; }
    
    .login-hint { font-size: 11px; color: #888780; text-align: center; margin-top: 8px; }
    
    .empty { text-align: center; padding: 2rem; color: #888780; }
    .loading { text-align: center; padding: 2rem; }
    
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.45); z-index: 1000; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: white; border-radius: 12px; padding: 2rem; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
    .modal-close { background: transparent; border: none; font-size: 24px; cursor: pointer; float: right; color: #888780; }
    .modal h2 { font-family: Playfair Display, serif; font-size: 24px; margin-bottom: 1rem; color: #4B1A3E; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-weight: 500; font-size: 13px; margin-bottom: 0.5rem; }
    .form-group input, .form-group textarea { width: 100%; padding: 10px 12px; border: 0.5px solid #d3d1c7; border-radius: 8px; font-family: Montserrat; font-size: 13px; }
    .form-group textarea { resize: vertical; min-height: 100px; }
  </style>
</head>
<body>

<div class="container">
  <h1>Trouvez vos professionnels</h1>
  <p class="subtitle">Courtiers, artisans, agents et mandataires de confiance</p>

  <div class="filters">
    <div class="filter-group">
      <label class="filter-label">Zone d'activité</label>
      <input type="text" id="zoneFilter" placeholder="Code postal ou département (ex: 83, 04)">
    </div>
    <div class="filter-group">
      <label class="filter-label">Type de professionnel</label>
      <div class="filter-buttons">
        <button class="filter-btn active" data-type="tous">Tous</button>
        <button class="filter-btn" data-type="courtier">Courtier</button>
        <button class="filter-btn" data-type="artisan">Artisan</button>
        <button class="filter-btn" data-type="agent">Agent/Mandataire</button>
      </div>
    </div>
  </div>

  <div id="prosContainer" class="grid"></div>
  <div id="emptyState" class="empty" style="display: none;">Aucun professionnel trouvé avec ces critères.</div>
  <div id="loadingState" class="loading">Chargement des professionnels...</div>
</div>

<div id="reviewsModal" class="modal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal('reviewsModal')">&times;</button>
    <h2>Avis</h2>
    <div id="reviewsContent"></div>
  </div>
</div>

<div id="contactModal" class="modal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal('contactModal')">&times;</button>
    <h2>Contacter</h2>
    <form id="contactForm" onsubmit="submitContact(event)">
      <div class="form-group">
        <label>Nom</label>
        <input type="text" id="contactName" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="contactEmail" required>
      </div>
      <div class="form-group">
        <label>Téléphone</label>
        <input type="tel" id="contactPhone">
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea id="contactMessage" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%;">Envoyer</button>
    </form>
  </div>
</div>

<div id="avisModal" class="modal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal('avisModal')">&times;</button>
    <h2>Laisser votre avis</h2>
    <form id="avisForm" onsubmit="submitAvis(event)">
      <div class="form-group">
        <label>Note</label>
        <select id="avisNote" required style="width: 100%; padding: 10px 12px; border: 0.5px solid #d3d1c7; border-radius: 8px; font-family: Montserrat;">
          <option value="">Sélectionnez une note</option>
          <option value="5">5 ⭐ Excellent</option>
          <option value="4">4 ⭐ Très bien</option>
          <option value="3">3 ⭐ Bien</option>
          <option value="2">2 ⭐ Moyen</option>
          <option value="1">1 ⭐ Mauvais</option>
        </select>
      </div>
      <div class="form-group">
        <label>Votre avis</label>
        <textarea id="avisTexte" required placeholder="Partagez votre expérience..."></textarea>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%;">Envoyer l'avis</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://kutbxyinpokebjdemlnq.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1dGJ4eWlucG9rZWJqZGVtbG5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTk2MTg0NjksImV4cCI6MjAzNTE5NDQ2OX0.Tq7iZLKOqiHVgLTdNWmJf-cWVYhpFJrKqVLl-z3vSLo';
const { createClient } = window.supabase;
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let allPros = [];
let currentUser = null;
let selectedProId = null;

const typeMapping = {
  'courtier': 'courtier',
  'artisan': 'artisan',
  'agent': ['agent_immobilier', 'mandataire_immobilier']
};

async function init() {
  await checkAuth();
  await loadPros();
  setupFilters();
}

async function checkAuth() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    const { data } = await supabase.from('profiles').select('*').eq('id', session.user.id).single();
    currentUser = data;
  }
}

async function loadPros() {
  const { data, error } = await supabase
    .from('profiles')
    .select('*')
    .in('role', ['courtier', 'artisan', 'agent_immobilier', 'mandataire_immobilier'])
    .eq('statut_verifie', true);
  
  if (error) {
    console.error('Erreur:', error);
    document.getElementById('loadingState').textContent = 'Erreur au chargement';
    return;
  }
  
  allPros = data;
  
  // Charger les avis pour chaque pro
  for (let pro of allPros) {
    const { data: avis } = await supabase
      .from('avis')
      .select('*')
      .eq('pro_id', pro.id)
      .eq('verifiee', true);
    
    if (avis && avis.length > 0) {
      const notes = avis.map(a => a.note);
      pro.note_moyenne = (notes.reduce((a, b) => a + b) / notes.length).toFixed(1);
      pro.nombre_avis = avis.length;
      pro.avis_list = avis;
    } else {
      pro.note_moyenne = 0;
      pro.nombre_avis = 0;
      pro.avis_list = [];
    }
  }
  
  document.getElementById('loadingState').style.display = 'none';
  renderPros(allPros);
}

function setupFilters() {
  document.getElementById('zoneFilter').addEventListener('input', filterPros);
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      filterPros();
    });
  });
}

function filterPros() {
  const zone = document.getElementById('zoneFilter').value.toLowerCase();
  const type = document.querySelector('.filter-btn.active').dataset.type;
  
  let filtered = allPros.filter(pro => {
    const matchZone = !zone || pro.code_postal?.includes(zone) || pro.ville?.toLowerCase().includes(zone);
    const matchType = type === 'tous' || (Array.isArray(typeMapping[type]) ? typeMapping[type].includes(pro.role) : pro.role === typeMapping[type]);
    return matchZone && matchType;
  });
  
  renderPros(filtered);
}

function renderPros(pros) {
  const container = document.getElementById('prosContainer');
  const emptyState = document.getElementById('emptyState');
  
  if (pros.length === 0) {
    container.innerHTML = '';
    emptyState.style.display = 'block';
    return;
  }
  
  emptyState.style.display = 'none';
  container.innerHTML = pros.map(pro => `
    <div class="card">
      <div class="card-header">
        <div class="avatar">${pro.prenom?.[0]?.toUpperCase()}${pro.nom?.[0]?.toUpperCase()}</div>
        <div class="card-title">
          <h3>${pro.prenom} ${pro.nom}</h3>
          <p>${pro.nom_entreprise || 'Professionnel'}</p>
        </div>
      </div>
      
      <div class="badges">
        ${pro.badge_type ? `<span class="badge">${pro.badge_type}</span>` : ''}
        <span class="badge ${pro.role.includes('courtier') ? 'courtier' : pro.role.includes('artisan') ? 'artisan' : 'agent'}">${pro.role === 'courtier' ? 'Courtier' : pro.role === 'artisan' ? 'Artisan' : 'Agent/Mandataire'}</span>
      </div>
      
      <p class="description">${pro.a_propos || 'Professionnel vérifiéé'}</p>
      
      <div class="info-box">
        <div class="info-line">
          📍 ${pro.code_postal || ''}, ${pro.ville || 'Zone à définir'}
        </div>
        <div class="info-line">
          <span class="status-dot ${pro.statut === 'joignable' ? 'status-online' : pro.statut === 'en_reunion' ? 'status-busy' : 'status-offline'}"></span>
          ${pro.statut === 'joignable' ? 'Joignable' : pro.statut === 'en_reunion' ? 'En réunion' : 'Indisponible'}
        </div>
        <div class="info-line">
          <strong>Prénom :</strong> ${pro.prenom || '-'}
        </div>
        <div class="info-line">
          <strong>Horaires :</strong> ${pro.disponibilites_rdv?.horaires || 'À définir'}
        </div>
        <div class="info-line">
          <strong>Disponibilités :</strong> ${pro.disponibilites_rdv?.types?.filter(t => t !== 'Chantier').join(', ') || 'Visio, Bureau'}
        </div>
      </div>
      
      <div class="rating">
        <span class="stars">${'★'.repeat(Math.round(pro.note_moyenne))}${'☆'.repeat(5 - Math.round(pro.note_moyenne))} (${pro.nombre_avis})</span>
        <button class="review-link" onclick="showReviews(${pro.id}, '${pro.prenom} ${pro.nom}')">Voir avis</button>
      </div>
      
      <div class="actions">
        <button class="btn btn-primary" onclick="openContact(${pro.id}, '${pro.prenom} ${pro.nom}')">${currentUser ? 'Contacter' : 'Contacter'}</button>
        <button class="btn btn-secondary" onclick="openAvis(${pro.id})">${currentUser ? 'Laisser votre avis' : 'Laisser votre avis'}</button>
      </div>
      <p class="login-hint">${!currentUser ? 'Connectez-vous pour contacter ou laisser un avis' : ''}</p>
    </div>
  `).join('');
}

function showReviews(proId, proName) {
  const pro = allPros.find(p => p.id === proId);
  const content = pro.avis_list.length > 0 
    ? pro.avis_list.map(a => `<div style="margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 0.5px solid #e5e4e1;">
      <div style="font-weight: 500; margin-bottom: 0.5rem;">★ ${a.note}/5</div>
      <p>${a.texte}</p>
    </div>`).join('')
    : '<p>Aucun avis pour le moment.</p>';
  
  document.getElementById('reviewsContent').innerHTML = content;
  document.getElementById('reviewsModal').classList.add('active');
}

function openContact(proId, proName) {
  if (!currentUser) {
    window.location.href = 'connexion.html';
    return;
  }
  selectedProId = proId;
  document.getElementById('contactModal').classList.add('active');
  document.getElementById('contactForm').onsubmit = (e) => submitContact(e, proId);
}

function openAvis(proId) {
  if (!currentUser) {
    window.location.href = 'connexion.html';
    return;
  }
  selectedProId = proId;
  document.getElementById('avisModal').classList.add('active');
  document.getElementById('avisForm').onsubmit = (e) => submitAvis(e, proId);
}

async function submitContact(e, proId) {
  e.preventDefault();
  
  const { error } = await supabase.from('demandes_contact').insert({
    courtier_id: proId,
    particulier_id: currentUser.id,
    nom: document.getElementById('contactName').value,
    email: document.getElementById('contactEmail').value,
    telephone: document.getElementById('contactPhone').value,
    message: document.getElementById('contactMessage').value
  });
  
  if (error) {
    alert('Erreur: ' + error.message);
  } else {
    alert('Demande envoyée avec succès!');
    closeModal('contactModal');
  }
}

async function submitAvis(e, proId) {
  e.preventDefault();
  
  const { error } = await supabase.from('avis').insert({
    pro_id: proId,
    particulier_id: currentUser.id,
    note: parseInt(document.getElementById('avisNote').value),
    texte: document.getElementById('avisTexte').value,
    verifiee: false
  });
  
  if (error) {
    alert('Erreur: ' + error.message);
  } else {
    alert('Avis envoyé! Il sera modéré avant publication.');
    closeModal('avisModal');
  }
}

function closeModal(modalId) {
  document.getElementById(modalId).classList.remove('active');
}

init();
</script>

</body>
</html>
