<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vitrine des Professionnels - ALB Immobilier</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --pourpre: #4B1A3E;
      --dore: #B28E3D;
      --creme: #f5f3ee;
      --light-bg: #f9f7f4;
    }
    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--creme);
      color: #2b2b2b;
    }

    .header {
      background: white;
      border-bottom: 3px solid var(--dore);
      padding: 20px 40px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-family: 'Playfair Display';
      font-size: 1.5rem;
      color: var(--pourpre);
      font-weight: 600;
      white-space: nowrap;
    }
    .logo strong { color: var(--dore); }
    .nav-menu {
      display: flex;
      gap: 40px;
      align-items: center;
      flex: 1;
      margin-left: 60px;
    }
    .nav-link {
      text-decoration: none;
      color: #2b2b2b;
      font-weight: 500;
      font-size: 0.95rem;
      transition: all 0.3s;
      border-bottom: 3px solid transparent;
      padding-bottom: 8px;
      white-space: nowrap;
    }
    .nav-link:hover {
      color: var(--pourpre);
    }
    .nav-link.active {
      color: var(--pourpre);
      border-bottom-color: var(--dore);
      font-weight: 600;
    }
    .header-actions {
      display: flex;
      gap: 15px;
      align-items: center;
      margin-left: auto;
    }
    .btn-logout {
      background: #d32f2f;
      color: white;
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }
    .btn-logout:hover {
      background: #b71c1c;
    }
    @media (max-width: 768px) {
      .nav-menu {
        gap: 15px;
        margin-left: 20px;
        font-size: 0.85rem;
      }
      .nav-link {
        font-size: 0.85rem;
      }
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .page-title {
      font-family: 'Playfair Display';
      color: var(--pourpre);
      margin-bottom: 10px;
      font-size: 2.2rem;
    }

    .page-subtitle {
      color: #666;
      margin-bottom: 40px;
      font-size: 1rem;
    }

    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 10px 20px;
      border: 2px solid var(--dore);
      background: white;
      color: var(--pourpre);
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    .filter-btn:hover {
      background: var(--light-bg);
    }

    .filter-btn.active {
      background: linear-gradient(135deg, var(--pourpre), #6b2d5f);
      color: white;
      border-color: var(--pourpre);
    }

    .pros-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 30px;
      margin-bottom: 40px;
    }

    .pro-card {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
    }

    .pro-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(75, 26, 62, 0.15);
    }

    .pro-card-header {
      background: linear-gradient(135deg, var(--pourpre), #6b2d5f);
      padding: 20px;
      color: white;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .pro-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--dore);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.2rem;
      color: white;
    }

    .pro-name {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .pro-role {
      font-size: 0.75rem;
      opacity: 0.9;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .pro-card-body {
      padding: 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .pro-location {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 15px;
      color: #666;
      font-size: 0.9rem;
    }

    .pro-location::before {
      content: "📍";
      font-size: 1rem;
    }

    .pro-info-row {
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f0f0f0;
    }

    .pro-info-row:last-of-type {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .pro-info-label {
      color: #999;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .pro-info-value {
      color: var(--pourpre);
      font-weight: 500;
      font-size: 0.95rem;
    }

    .pro-description {
      color: #666;
      font-size: 0.9rem;
      line-height: 1.5;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #f0f0f0;
      flex: 1;
    }

    .verified-badge {
      display: inline-block;
      background: #d4edda;
      color: #155724;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-top: 10px;
    }

    .pro-cta {
      background: linear-gradient(135deg, var(--pourpre), #6b2d5f);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      margin-top: 15px;
      transition: all 0.3s;
    }

    .pro-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(75, 26, 62, 0.2);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .empty-state h3 {
      color: var(--pourpre);
      margin-bottom: 10px;
      font-size: 1.3rem;
    }

    .empty-state p {
      color: #999;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    @media (max-width: 768px) {
      .pro-card {
        grid-column: span 1;
      }
      .pros-grid {
        grid-template-columns: 1fr;
      }
      .page-title {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-content">
    <a href="index.html" style="text-decoration: none;">
      <div class="logo"><strong>ALB</strong> Immobilier</div>
    </a>
    <nav class="nav-menu">
      <a href="index.html" class="nav-link">Accueil</a>
      <a href="annonces.html" class="nav-link">Annonces</a>
      <a href="vitrine-pros.html" class="nav-link active">Vitrine des pros</a>
      <a href="#travaux" class="nav-link">Projets travaux</a>
      <a href="#financement" class="nav-link">Projets financement</a>
      <a href="espace-alb.html" class="nav-link">Espace ALB</a>
    </nav>
    <div class="header-actions">
      <button class="btn-logout" id="btn-logout" style="display: none;" onclick="logout()">🔐 Déconnexion</button>
    </div>
  </div>
</header>

<div class="container">
  <h1 class="page-title">🤝 Nos Professionnels</h1>
  <p class="page-subtitle">Découvrez les courtiers, artisans et agents immobiliers vérifiés du Var et région PACA</p>

  <!-- FILTRES -->
  <div class="filters">
    <button class="filter-btn active" onclick="filterPros('all')">Tous</button>
    <button class="filter-btn" onclick="filterPros('courtier')">💼 Courtiers</button>
    <button class="filter-btn" onclick="filterPros('artisan')">🔨 Artisans</button>
    <button class="filter-btn" onclick="filterPros('immo')">🏢 Agents/Mandataires</button>
  </div>

  <!-- GRID PROS -->
  <div id="pros-container">
    <div class="loading">Chargement des professionnels...</div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>

<script>
  let allPros = [];
  let currentFilter = 'all';

  async function loadPros() {
    try {
      const { data, error } = await window.supabaseClient
        .from('profiles')
        .select('id, nom_entreprise, ville, code_postal, zone_intervention, temps_reponse_moyen, presentation, role')
        .eq('statut_verifie', true)
        .in('role', ['courtier', 'artisan', 'immo'])
        .order('role', { ascending: true })
        .order('nom_entreprise', { ascending: true });

      if (error) {
        console.error('Erreur chargement pros:', error);
        document.getElementById('pros-container').innerHTML = `
          <div class="empty-state">
            <h3>Erreur</h3>
            <p>Impossible de charger les professionnels. ${error.message}</p>
          </div>
        `;
        return;
      }

      allPros = data || [];
      renderPros();
      
      // Écouter les changements en temps réel
      subscribeToProChanges();

      // Affiche logout si connecté
      const userId = localStorage.getItem('alb_user');
      if (userId) {
        document.getElementById('btn-logout').style.display = 'block';
      }

    } catch (error) {
      console.error('Erreur:', error);
      document.getElementById('pros-container').innerHTML = `
        <div class="empty-state">
          <h3>Erreur</h3>
          <p>Une erreur est survenue. Veuillez réessayer.</p>
        </div>
      `;
    }
  }

  function subscribeToProChanges() {
    window.supabaseClient
      .channel('pros-updates')
      .on('postgres_changes', {
        event: 'UPDATE',
        schema: 'public',
        table: 'profiles',
        filter: 'statut_verifie=eq.true'
      }, payload => {
        console.log('Pro mis à jour en temps réel:', payload.new.nom_entreprise);
        
        // Mettre à jour le pro dans allPros
        const index = allPros.findIndex(p => p.id === payload.new.id);
        if (index !== -1) {
          allPros[index] = {
            ...allPros[index],
            nom_entreprise: payload.new.nom_entreprise,
            presentation: payload.new.presentation,
            zone_intervention: payload.new.zone_intervention,
            temps_reponse_moyen: payload.new.temps_reponse_moyen,
            ville: payload.new.ville,
            code_postal: payload.new.code_postal,
            role: payload.new.role
          };
          renderPros();
        }
      })
      .subscribe();
  }

  function filterPros(role) {
    currentFilter = role;

    // Mise à jour des boutons
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');

    renderPros();
  }

  function renderPros() {
    let filtered = allPros;
    if (currentFilter !== 'all') {
      filtered = allPros.filter(pro => pro.role === currentFilter);
    }

    if (filtered.length === 0) {
      document.getElementById('pros-container').innerHTML = `
        <div class="empty-state">
          <h3>Aucun professionnel trouvé</h3>
          <p>Il n'y a pas encore de professionnels pour cette catégorie.</p>
        </div>
      `;
      return;
    }

    const html = filtered.map(pro => `
      <div class="pro-card">
        <div class="pro-card-header">
          <div class="pro-avatar">${getInitials(pro.nom_entreprise)}</div>
          <div>
            <div class="pro-name">${pro.nom_entreprise}</div>
            <div class="pro-role">${getRoleLabel(pro.role)}</div>
          </div>
        </div>
        <div class="pro-card-body">
          <div class="pro-location">${pro.code_postal} ${pro.ville}</div>

          ${pro.zone_intervention ? `
            <div class="pro-info-row">
              <div class="pro-info-label">Zone d'intervention</div>
              <div class="pro-info-value">${pro.zone_intervention}</div>
            </div>
          ` : ''}

          ${pro.temps_reponse_moyen ? `
            <div class="pro-info-row">
              <div class="pro-info-label">Temps de réponse</div>
              <div class="pro-info-value">${pro.temps_reponse_moyen}</div>
            </div>
          ` : ''}

          ${pro.presentation ? `
            <div class="pro-description">${pro.presentation}</div>
          ` : ''}

          <div class="verified-badge">✅ Professionnel vérifié</div>

          <button class="pro-cta" onclick="contactPro('${pro.id}', '${pro.nom_entreprise}')">
            📩 Nous contacter
          </button>
        </div>
      </div>
    `).join('');

    const container = document.createElement('div');
    container.className = 'pros-grid';
    container.innerHTML = html;
    document.getElementById('pros-container').innerHTML = '';
    document.getElementById('pros-container').appendChild(container);
  }

  function getInitials(name) {
    if (!name) return 'P';
    return name
      .split(' ')
      .map(word => word[0])
      .join('')
      .toUpperCase()
      .slice(0, 2);
  }

  function getRoleLabel(role) {
    const labels = {
      'courtier': '💼 Courtier',
      'artisan': '🔨 Artisan',
      'immo': '🏢 Agent/Mandataire'
    };
    return labels[role] || role;
  }

  function contactPro(proId, proName) {
    const userId = localStorage.getItem('alb_user');
    if (!userId) {
      if (confirm('Vous devez être connecté pour contacter un professionnel. Aller à la connexion?')) {
        window.location.href = 'login.html';
      }
      return;
    }

    alert(`✅ Demande de contact envoyée à ${proName}! Vous serez recontacté(e) très bientôt.`);
  }

  function logout() {
    if (confirm('Êtes-vous sûr de vouloir vous déconnecter ?')) {
      localStorage.removeItem('alb_user');
      window.location.href = 'index.html';
    }
  }

  // Charge les pros au chargement
  loadPros();
</script>

</body>
</html>
